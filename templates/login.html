{% extends 'navbar.html' %}
{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');

  .auth-outer {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: #fff; border: .5px solid #e5e7eb;
    border-radius: 24px; padding: 44px 40px;
    box-shadow: 0 8px 48px rgba(0,0,0,.07);
    animation: fadeInUp .4s ease;
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .auth-logo {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 28px;
  }
  .auth-logo-icon {
    width: 44px; height: 44px; border-radius: 13px;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .auth-logo-text {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--green-dark);
  }
  .auth-logo-text span { color: var(--green); }

  .auth-title {
    font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
    color: #111; text-align: center; margin-bottom: 6px;
  }
  .auth-sub {
    text-align: center; font-size: 13.5px; color: #6b7280;
    margin-bottom: 30px; line-height: 1.5;
  }

  .form-group { margin-bottom: 18px; }
  .form-label { display:block; margin-bottom:7px; font-size:13px; font-weight:500; color:#374151; }
  .form-input {
    width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:14px; color:#111;
    background:#fff; transition:border-color .2s,box-shadow .2s; outline:none;
  }
  .form-input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
  .form-input::placeholder { color:#9ca3af; }

  .input-icon-wrap { position:relative; }
  .input-icon-wrap .form-input { padding-left:42px; }
  .input-icon {
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    font-size:16px; pointer-events:none;
  }

  .auth-submit {
    width:100%; padding:13px; background:var(--green-dark); color:#fff;
    font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
    border:none; border-radius:11px; cursor:pointer;
    transition:background .2s,transform .15s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:6px;
  }
  .auth-submit:hover { background:#0f3d22; transform:translateY(-1px); }

  .auth-divider { text-align:center; color:#9ca3af; font-size:12px; margin:20px 0; }

  .auth-alt {
    text-align:center; font-size:13.5px; color:#6b7280; margin-top:20px;
  }
  .auth-alt a { color:var(--green-dark); font-weight:600; text-decoration:none; }
  .auth-alt a:hover { text-decoration:underline; }

  .auth-error {
    background:#fee2e2; border:.5px solid #fecaca; color:#991b1b;
    padding:12px 16px; border-radius:10px; font-size:13.5px;
    display:flex; align-items:center; gap:8px; margin-bottom:20px;
  }
</style>

<div class="auth-outer">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">♻️</div>
      <div class="auth-logo-text">Smart<span>Waste</span></div>
    </div>

    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to continue managing waste smarter.</div>

    {% if error %}
    <div class="auth-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login/" id="loginForm">
      {% csrf_token %}
      {% if request.GET.next %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      {% endif %}

      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <div class="input-icon-wrap">
          <span class="input-icon">👤</span>
          <input id="id_username" type="text" name="username" required
            placeholder="Enter your username" class="form-input"
            autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input id="id_password" type="password" name="password" required
            placeholder="Enter your password" class="form-input"
            autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="auth-submit" id="loginBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 8H3m5-3 3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 4V3a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        Sign In
      </button>
    </form>

    <div class="auth-alt">
      Don't have an account? <a href="/register/">Create one →</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(){
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Signing in…';
    btn.disabled = true;
  });
</script>

{% endblock %}
