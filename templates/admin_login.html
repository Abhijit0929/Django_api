<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · SmartWaste</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #060f0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: #22c55e; top: -180px; left: -180px; }
    .blob-2 { width: 350px; height: 350px; background: #16a34a; bottom: -120px; right: -100px; }

    /* Grid pattern overlay */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(34,197,94,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 44px 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 700; color: #fff;
    }
    .logo-text span { color: #4ade80; }

    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.25);
      color: #86efac; font-size: 11px; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase; padding: 4px 12px; border-radius: 100px;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800; color: #fff;
      line-height: 1.15; margin-bottom: 6px;
    }
    h1 span { color: #4ade80; }

    .subtitle {
      font-size: 13.5px; color: rgba(255,255,255,.45);
      margin-bottom: 32px; line-height: 1.5;
    }

    /* Error box */
    .error-box {
      background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25);
      border-radius: 12px; padding: 12px 16px;
      color: #fca5a5; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
      animation: shake .3s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block; margin-bottom: 7px;
      font-size: 12.5px; font-weight: 500; color: rgba(255,255,255,.55);
      letter-spacing: .04em;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input:focus {
      border-color: #22c55e;
      background: rgba(34,197,94,.06);
      box-shadow: 0 0 0 3px rgba(34,197,94,.12);
    }
    input::placeholder { color: rgba(255,255,255,.2); }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none; border-radius: 12px;
      color: #052e0f; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .15s;
      margin-top: 8px;
    }
    .submit-btn:hover { opacity: .88; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .divider {
      text-align: center; color: rgba(255,255,255,.2);
      font-size: 12px; margin: 22px 0 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,.08);
    }

    .back-link {
      display: block; text-align: center;
      font-size: 13px; color: rgba(255,255,255,.35);
      text-decoration: none; transition: color .15s;
    }
    .back-link:hover { color: #4ade80; }

    .shield-icon {
      position: absolute; top: -14px; right: 24px;
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #0a2e1a, #065f46);
      border: 2px solid rgba(34,197,94,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <!-- Ambient blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <!-- Shield badge (decorative) -->
    <div class="shield-icon">🛡️</div>

    <!-- Logo -->
    <div class="logo-row">
      <div class="logo-icon">♻️</div>
      <div class="logo-text">Smart<span>Waste</span></div>
    </div>

    <div class="admin-badge">⚙️ Admin Access</div>
    <h1>Admin <span>Portal</span></h1>
    <p class="subtitle">Restricted area. Staff credentials required to proceed.</p>

    <!-- Error -->
    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="/admin-login/">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">USERNAME</label>
        <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">PASSWORD</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="submit-btn">
        🔐 Access Admin Dashboard
      </button>
    </form>

    <div class="divider">or</div>
    <a href="/" class="back-link">← Back to main site</a>
  </div>

</body>
</html>
