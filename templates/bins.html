{% extends "navbar.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-4">
Nearby Smart Bins
</h2>

<div class="grid grid-cols-3 gap-4">

{% for bin in bins %}

<div class="bg-white p-4 rounded shadow">

<p><b>Location:</b> {{ bin.location }}</p>

<p><b>Fill Level:</b> {{ bin.fill_level }}%</p>

<p><b>Status:</b> {{ bin.status }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
