{% extends 'navbar.html' %}
{% block content %}

<style>
  .auth-outer {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
  }
  .auth-card {
    width: 100%; max-width: 460px;
    background: #fff; border: .5px solid #e5e7eb;
    border-radius: 24px; padding: 44px 40px;
    box-shadow: 0 8px 48px rgba(0,0,0,.07);
    animation: fadeInUp .4s ease;
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .auth-logo {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 28px;
  }
  .auth-logo-icon {
    width: 44px; height: 44px; border-radius: 13px;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .auth-logo-text {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--green-dark);
  }
  .auth-logo-text span { color: var(--green); }
  .auth-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color:#111; text-align:center; margin-bottom:6px; }
  .auth-sub { text-align:center; font-size:13.5px; color:#6b7280; margin-bottom:30px; line-height:1.5; }
  .form-group { margin-bottom: 18px; }
  .form-label { display:block; margin-bottom:7px; font-size:13px; font-weight:500; color:#374151; }
  .form-input {
    width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:14px; color:#111;
    background:#fff; transition:border-color .2s,box-shadow .2s; outline:none;
  }
  .form-input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
  .form-input::placeholder { color:#9ca3af; }
  .input-icon-wrap { position:relative; }
  .input-icon-wrap .form-input { padding-left:42px; }
  .input-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
  .auth-submit {
    width:100%; padding:13px; background:var(--green); color:#052e0f;
    font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
    border:none; border-radius:11px; cursor:pointer;
    transition:background .2s,transform .15s;
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:6px;
  }
  .auth-submit:hover { background:#16a34a; transform:translateY(-1px); }
  .auth-alt { text-align:center; font-size:13.5px; color:#6b7280; margin-top:20px; }
  .auth-alt a { color:var(--green-dark); font-weight:600; text-decoration:none; }
  .auth-alt a:hover { text-decoration:underline; }
  .auth-error {
    background:#fee2e2; border:.5px solid #fecaca; color:#991b1b;
    padding:12px 16px; border-radius:10px; font-size:13.5px;
    display:flex; align-items:center; gap:8px; margin-bottom:20px;
  }
  .password-hint { font-size:11.5px; color:#9ca3af; margin-top:5px; }
  .two-col-form { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:500px){ .two-col-form{grid-template-columns:1fr;} .auth-card{padding:32px 24px;} }
  .strength-bar { height:4px; border-radius:2px; background:#e5e7eb; margin-top:6px; overflow:hidden; }
  .strength-fill { height:100%; border-radius:2px; transition:width .3s,background .3s; width:0; }
</style>

<div class="auth-outer">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">♻️</div>
      <div class="auth-logo-text">Smart<span>Waste</span></div>
    </div>

    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Join the community. Help keep our city clean.</div>

    {% if error %}
    <div class="auth-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/register/" id="registerForm">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="reg_username">Username <span style="color:#ef4444">*</span></label>
        <div class="input-icon-wrap">
          <span class="input-icon">👤</span>
          <input id="reg_username" type="text" name="username" required
            placeholder="Choose a username" class="form-input"
            autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg_email">Email Address</label>
        <div class="input-icon-wrap">
          <span class="input-icon">📧</span>
          <input id="reg_email" type="email" name="email"
            placeholder="your@email.com" class="form-input"
            autocomplete="email">
        </div>
      </div>

      <div class="two-col-form">
        <div class="form-group">
          <label class="form-label" for="reg_pw1">Password <span style="color:#ef4444">*</span></label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input id="reg_pw1" type="password" name="password1" required
              placeholder="Min 6 characters" class="form-input"
              autocomplete="new-password" oninput="checkStrength(this.value)">
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="password-hint" id="strengthLabel">Enter a password</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg_pw2">Confirm Password <span style="color:#ef4444">*</span></label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔑</span>
            <input id="reg_pw2" type="password" name="password2" required
              placeholder="Repeat password" class="form-input"
              autocomplete="new-password">
          </div>
        </div>
      </div>

      <button type="submit" class="auth-submit" id="registerBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        Create Account
      </button>
    </form>

    <div class="auth-alt">
      Already have an account? <a href="/login/">Sign in →</a>
    </div>
  </div>
</div>

<script>
function checkStrength(pw){
  const fill  = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if(pw.length >= 6) score++;
  if(pw.length >= 10) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;

  const levels = [
    {w:'0%',  c:'#e5e7eb', t:'Enter a password'},
    {w:'25%', c:'#ef4444', t:'Weak'},
    {w:'50%', c:'#f59e0b', t:'Fair'},
    {w:'75%', c:'#3b82f6', t:'Good'},
    {w:'100%',c:'#22c55e', t:'Strong 💪'},
  ];
  const lvl = levels[Math.min(score, 4)];
  fill.style.width      = lvl.w;
  fill.style.background = lvl.c;
  label.textContent     = lvl.t;
  label.style.color     = lvl.c;
}

document.getElementById('registerForm').addEventListener('submit', function(e){
  const pw1 = document.getElementById('reg_pw1').value;
  const pw2 = document.getElementById('reg_pw2').value;
  if(pw1 !== pw2){
    e.preventDefault();
    alert('Passwords do not match!');
    return;
  }
  const btn = document.getElementById('registerBtn');
  btn.textContent = 'Creating account…';
  btn.disabled = true;
});
</script>

{% endblock %}
