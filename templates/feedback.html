<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Smart Waste Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 150px;
        }
        
        .rating-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .rating-group input[type="radio"] {
            display: none;
        }
        
        .rating-group label {
            margin-bottom: 0;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-weight: bold;
            color: #999;
            transition: all 0.3s;
        }
        
        .rating-group input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>We'd Love Your Feedback</h1>
        <p class="subtitle">Help us improve the Smart Waste Management system</p>
        
        <div class="success-message" id="successMessage">
            Thank you! Your feedback has been submitted successfully.
        </div>
        
        <form id="feedbackForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="category">Feedback Category *</label>
                <select id="category" name="category" required>
                    <option value="">Select a category</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                    <option value="improvement">Improvement Suggestion</option>
                    <option value="general">General Feedback</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Overall Rating *</label>
                <div class="rating-group">
                    <input type="radio" id="rate1" name="rating" value="1" required>
                    <label for="rate1">1</label>
                    
                    <input type="radio" id="rate2" name="rating" value="2">
                    <label for="rate2">2</label>
                    
                    <input type="radio" id="rate3" name="rating" value="3">
                    <label for="rate3">3</label>
                    
                    <input type="radio" id="rate4" name="rating" value="4">
                    <label for="rate4">4</label>
                    
                    <input type="radio" id="rate5" name="rating" value="5">
                    <label for="rate5">5</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="message">Your Feedback *</label>
                <textarea id="message" name="message" required placeholder="Please share your thoughts..."></textarea>
            </div>
            
            <button type="submit">Submit Feedback</button>
        </form>
    </div>
    
    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                category: document.getElementById('category').value,
                rating: document.querySelector('input[name="rating"]:checked').value,
                message: document.getElementById('message').value
            };
            
            console.log('Feedback submitted:', formData);
            
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('feedbackForm').reset();
            
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
