<!DOCTYPE html>
<html>
<head>
    <title>Report Waste</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map {
            height: 400px;
        }
    </style>
</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-4 text-green-600">
Report Garbage
</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<!-- Button -->
<button 
type="button"
onclick="getUserLocation()"
class="bg-blue-600 text-white px-4 py-2 rounded mb-4 hover:bg-blue-700"
>
Use My Current Location
</button>

<!-- Map -->
<div id="map" class="mb-4 rounded"></div>

<!-- Hidden fields -->
<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">

<!-- Location -->
<label class="block mb-1 font-semibold">Location</label>
<input
type="text"
name="location"
id="location"
placeholder="Click on map or use current location"
class="border p-2 w-full mb-3 rounded"
/>
<!-- Photo Upload -->
<label class="block mb-1 font-semibold">Upload or Capture Photo</label>

<input 
type="file" 
name="image" 
accept="image/*" 
capture="environment"
class="border p-2 w-full mb-4 rounded"
/>

<!-- Description -->
<label class="block mb-1 font-semibold">Description</label>
<textarea
name="description"
placeholder="Describe the garbage problem"
class="border p-2 w-full mb-4 rounded"
></textarea>

<button
class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"
>
Submit report for future action
</button>

</form>
</div>

<script>

// ✅ Initialize map (ONLY ONCE)
var map = L.map('map').setView([18.6298, 73.7997], 13);

// ✅ Load tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

var marker;

// ✅ FIX gray map issue
setTimeout(() => {
    map.invalidateSize();
}, 500);


// 👉 CLICK ON MAP
map.on('click', function(e){

    var lat = e.latlng.lat;
    var lon = e.latlng.lng;

    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lon;

    if(marker){
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lon]).addTo(map);

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
    .then(response => response.json())
    .then(data => {

        var locationName = data.display_name;

        document.getElementById("location").value = locationName;
        marker.bindPopup(locationName).openPopup();

    });

});


// 👉 CURRENT LOCATION FUNCTION
function getUserLocation(){

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(function(position){

            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            map.setView([lat, lon], 16);

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lon;

            if(marker){
                map.removeLayer(marker);
            }

            marker = L.marker([lat, lon]).addTo(map);

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(response => response.json())
            .then(data => {

                var locationName = data.display_name;

                document.getElementById("location").value = locationName;
                marker.bindPopup("You are here: " + locationName).openPopup();

            });

            // ✅ FIX map rendering after move
            setTimeout(() => {
                map.invalidateSize();
            }, 200);

        },
        function(error){
            alert("Location access denied or not available");
        });

    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

</script>

</body>
</html>
